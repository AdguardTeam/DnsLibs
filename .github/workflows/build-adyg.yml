name: Build adyg

# Reusable workflow that builds the `adyg` CLI tool (dig-like DNS query tool:
# plain DNS, DoT, DoH, DoQ, DNSCrypt) for Linux, macOS and Windows, signs and
# notarizes it, and collects every platform archive into a single
# `release-artifacts` artifact for the caller to attach to a GitHub Release.
#
# Produced files (VERSION = git describe --tags, without the leading "v"):
#   adyg-v${VERSION}-linux-<arch>.tar.gz    (x86_64, aarch64, armv7, mips, mipsel)
#   adyg-v${VERSION}-macos-universal.tar.gz (x86_64 + arm64 lipo, notarized)
#   adyg-v${VERSION}-windows-<arch>.zip     (x86_64, i686, aarch64;
#                                            Authenticode-signed)
#
# Every binary is GPG-signed with devteam@adguard.com; the detached signature
# ships alongside it inside the archive (adyg.sig / adyg.exe.sig).
#
# workflow_dispatch is wired up so the whole pipeline can be exercised without
# cutting a release.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (SHA or branch) to build from. If omitted, uses the default checkout.'
        required: false
        type: string
      linux_arches:
        description: 'Space-separated Linux architectures to build.'
        required: false
        default: 'x86_64 aarch64 armv7 mips mipsel'
        type: string
  workflow_call:
    inputs:
      ref:
        description: 'Git ref (SHA or branch) to build from. If omitted, uses the default checkout.'
        required: false
        type: string
      linux_arches:
        description: 'Space-separated Linux architectures to build.'
        required: false
        default: 'x86_64 aarch64 armv7 mips mipsel'
        type: string

jobs:
# =============================================================================
# Stage 1: Build artifacts (parallel)
# =============================================================================

  # Resolve the version once and hand it to every platform job. The Windows
  # image has no bash, so `git describe | sed` cannot run there; resolving it
  # here also guarantees that every platform stamps the same version.
  version:
    name: Resolve version
    if: github.repository == 'AdGuardSoftwareLimited/dns-libs'
    runs-on: [team-corelibs]
    outputs:
      value: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          # Full history + tags so git describe can resolve the version.
          fetch-depth: 0

      - name: Detect version
        id: version
        run: |
          VERSION=$(git describe --tags --match 'v*' | sed -e 's/^v//')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  resolve-images:
    if: github.repository == 'AdGuardSoftwareLimited/dns-libs'
    uses: AdGuardSoftwareLimited/native-libs-common/.github/workflows/resolve-images.yml@master

  build-linux:
    name: Linux adyg build
    if: github.repository == 'AdGuardSoftwareLimited/dns-libs'
    needs: [resolve-images, version]
    runs-on:
      - ephemeral
      - ephemeral-linux
      - ${{ needs.resolve-images.outputs.corelibs-builder }}
      - ephemeral-limit-memory-8192
      - ephemeral-limit-cpu-6
    container:
      # 2.12 is the first image with zig, which the musl-cross-* presets use.
      image: adguard/core-libs:2.12
    permissions:
      contents: read
      id-token: write
    env:
      # sccache local-disk store, restored/saved across runs by the
      # registry-cache action as an OCI registry blob. SCCACHE_CACHE_SIZE caps
      # the on-disk store (and thus the per-key blob) so a force-save stays
      # bounded.
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      SCCACHE_CACHE_SIZE: 512M
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          # The version comes from the `version` job; full history + tags are
          # kept so cmake/version.cmake's own git describe fallback still works.
          fetch-depth: 0

      # sccache wraps the zig-driven clang of the musl cross presets so the adyg objects are reused
      # across runs. The binary is installed by AdguardTeam/sccache-action
      # (binary only); the local SCCACHE_DIR store is restored here and saved
      # after the build.
      - name: Configure sccache
        uses: AdguardTeam/sccache-action@main

      - name: Restore sccache store
        uses: AdGuardSoftwareLimited/actions/actions/registry-cache/restore@master
        with:
          config: ${{ secrets.REGISTRY_CACHE_AUTH }}
          # Per-job prefix + conanfile.py hash so the store resets when the
          # dependency graph changes. sccache is content-addressed, so
          # source-only changes accumulate without invalidating the key.
          key: sccache-adyg-linux-${{ hashFiles('conanfile.py') }}
          path: ${{ env.SCCACHE_DIR }}

      - name: Retrieve GPG signing secrets
        uses: hashicorp/vault-action@v4
        with:
          url: ${{ vars.VAULT_URL }}
          method: jwt
          role: gpg-signing
          secrets: |
            secret/data/ci-secrets/gpg-signing gpgSecretKey | GPG_SECRET_KEY ;
            secret/data/ci-secrets/gpg-signing gpgPassword | GPG_PASSWORD

      - name: Configure Conan
        # The container runs `run:` steps with sh, which has no `source`.
        shell: bash
        run: |
          set -e -x

          # The Conan pinned in the adguard/core-libs image is too old for these
          # builds: its settings.yml does not list the clang version that
          # `zig cc` reports (22), so every musl-cross configure dies with
          # "Invalid setting '22' is not a valid 'settings.compiler.version'".
          # Install an up-to-date Conan into a venv (same trick as the macOS
          # job) and use it for every step below; the image's Conan is left
          # alone, and the shared ~/.conan2 cache still provides the
          # pre-built dependencies.
          python3 -m venv venv
          source ./venv/bin/activate
          pip install --upgrade pip conan
          conan --version
          conan remote add --index 0 art ${{ vars.CONAN_REPO_URL }} || true

      - name: Import GPG key
        run: |
          echo "${GPG_SECRET_KEY}" | sed -e 'N;s/\(BEGIN PGP PRIVATE KEY BLOCK-----\n\)\(.\)/\1\n\2/' | gpg --import --batch --yes

      - name: Build for all architectures
        env:
          GPG_KEY: devteam@adguard.com
          # Read by cmake/version.cmake, so the version is baked into the binary.
          DNS_LIBS_VERSION: ${{ needs.version.outputs.value }}
          VERSION: ${{ needs.version.outputs.value }}
          ARCHES: ${{ inputs.linux_arches }}
          # The image already provides the Conan dependencies.
          SKIP_BOOTSTRAP: 1
        shell: bash
        run: |
          set -x -e

          source ./venv/bin/activate

          mkdir -p artifacts
          ARTIFACTS_DIR=${PWD}/artifacts

          # One musl-cross-<arch> preset per architecture; see CMakePresets.json.
          for ARCH in ${ARCHES}; do
            BUILD_DIR=cmake-build-musl-cross-${ARCH}-relwithdebinfo
            make PRESET=musl-cross-${ARCH}-relwithdebinfo \
              CMAKE_LAUNCHER=sccache build_adyg

            NAME=adyg-v${VERSION}-linux-${ARCH}
            pushd ${BUILD_DIR}/tools/adyg
              llvm-strip adyg
              gpg --default-key "${GPG_KEY}" --detach-sig \
                  --passphrase "${GPG_PASSWORD}" --pinentry-mode loopback \
                  adyg
              cp ${GITHUB_WORKSPACE}/LICENSE.md .
              tar zcf ${NAME}.tar.gz --transform "s,^,${NAME}/," \
                adyg adyg.sig LICENSE.md
              mv ${NAME}.tar.gz ${ARTIFACTS_DIR}/
            popd
          done

      # Print sccache counters and decide whether to force-save the store: the
      # save action skips the upload when the key already exists, so the store
      # would freeze after the first run. force=true whenever sccache wrote new
      # entries this run, so source-only changes accumulate.
      - name: sccache stats
        id: sccache-stats
        if: always()
        shell: bash
        run: |
          sccache --show-stats || true
          cache_writes=$(sccache --show-stats --stats-format=json 2>/dev/null \
            | grep -o '"cache_writes":[0-9]*' | grep -o '[0-9]*' || echo 0)
          if [ "$cache_writes" -gt 0 ] 2>/dev/null; then
            echo "force=true" >> "$GITHUB_OUTPUT"
          else
            echo "force=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Save sccache store
        if: always()
        uses: AdGuardSoftwareLimited/actions/actions/registry-cache/save@master
        with:
          config: ${{ secrets.REGISTRY_CACHE_AUTH }}
          key: sccache-adyg-linux-${{ hashFiles('conanfile.py') }}
          path: ${{ env.SCCACHE_DIR }}
          force: ${{ steps.sccache-stats.outputs.force }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-linux
          path: artifacts/adyg-*.tar.gz
          if-no-files-found: error
          retention-days: 7

      - name: Upload to Conan and cleanup
        if: always()
        env:
          ARTIFACTORY_USER: ${{ secrets.ARTIFACTORY_USER }}
          ARTIFACTORY_API_KEY: ${{ secrets.ARTIFACTORY_API_KEY }}
        # The container runs `run:` steps with sh, which has no `source`.
        shell: bash
        run: |
          set -x
          source ./venv/bin/activate
          conan remote login art "$ARTIFACTORY_USER" --password "$ARTIFACTORY_API_KEY" || true
          conan upload -r art -c "*" 2>&1 | grep --line-buffered "Uploading" || true

  build-macos:
    name: Mac adyg build
    if: github.repository == 'AdGuardSoftwareLimited/dns-libs'
    needs: [resolve-images, version]
    runs-on:
      - ephemeral
      - ephemeral-mac
      - ${{ needs.resolve-images.outputs.macos }}
    permissions:
      contents: read
      id-token: write
    env:
      # sccache local-disk store, restored/saved across runs by the
      # registry-cache action as an OCI registry blob. SCCACHE_CACHE_SIZE caps
      # the on-disk store (and thus the per-key blob) so a force-save stays
      # bounded.
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      SCCACHE_CACHE_SIZE: 512M
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          # The version comes from the `version` job; full history + tags are
          # kept so cmake/version.cmake's own git describe fallback still works.
          fetch-depth: 0

      # sccache wraps Apple Clang so the adyg objects are reused
      # across runs. The binary is installed by AdguardTeam/sccache-action
      # (binary only); the local SCCACHE_DIR store is restored here and saved
      # after the build.
      - name: Configure sccache
        uses: AdguardTeam/sccache-action@main

      - name: Restore sccache store
        uses: AdGuardSoftwareLimited/actions/actions/registry-cache/restore@master
        with:
          config: ${{ secrets.REGISTRY_CACHE_AUTH }}
          # Per-job prefix + conanfile.py hash so the store resets when the
          # dependency graph changes. sccache is content-addressed, so
          # source-only changes accumulate without invalidating the key.
          key: sccache-adyg-mac-${{ hashFiles('conanfile.py') }}
          path: ${{ env.SCCACHE_DIR }}

      - name: Retrieve GPG signing secrets
        uses: hashicorp/vault-action@v4
        with:
          url: ${{ vars.VAULT_URL }}
          method: jwt
          role: gpg-signing
          secrets: |
            secret/data/ci-secrets/gpg-signing gpgSecretKey | GPG_SECRET_KEY ;
            secret/data/ci-secrets/gpg-signing gpgPassword | GPG_PASSWORD

      - name: Configure environment
        run: |
          python3 -m venv venv
          source ./venv/bin/activate
          pip install conan
          conan remote add --index 0 art ${{ vars.CONAN_REPO_URL }} || true

      - name: Import GPG key
        run: |
          echo "${GPG_SECRET_KEY}" | sed -e 'N;s/\(BEGIN PGP PRIVATE KEY BLOCK-----\n\)\(.\)/\1\n\2/' | gpg --import --batch --yes

      - name: Sync signing certificates
        uses: AdGuardSoftwareLimited/apple-devices/.github/actions/match-sync@master
        with:
          type: developer_id
          app_id: com.adguard.dnslibs.adyg
          keychain_name: ${{ runner.temp }}/adyg-signing.keychain-db
          platform: macos
          skip_profiles: "true"
          vault_url: ${{ vars.VAULT_URL }}

      - name: Build universal binary
        env:
          # Read by cmake/version.cmake, so the version is baked into the binary.
          DNS_LIBS_VERSION: ${{ needs.version.outputs.value }}
          # The runner image already provides the Conan dependencies.
          SKIP_BOOTSTRAP: 1
        run: |
          set -x -e
          source ./venv/bin/activate

          # Both slices use the clang-relwithdebinfo preset, so each one gets its
          # own BUILD_DIR instead of the preset's default directory.
          ARCHES="x86_64 arm64"
          for ARCH in $ARCHES; do
            make PRESET=clang-relwithdebinfo \
              ARCH=${ARCH} \
              BUILD_DIR=build_${ARCH} \
              CMAKE_LAUNCHER=sccache \
              build_adyg
          done

          mkdir -p build_universal
          pushd build_universal
            lipo -create -output adyg \
              ../build_arm64/tools/adyg/adyg \
              ../build_x86_64/tools/adyg/adyg
            strip adyg
          popd

      - name: Code sign binary
        env:
          CODESIGN_IDENTITY: "Developer ID Application: Adguard Software Limited (TC3Q7MAJXF)"
          CODESIGN_IDENTIFIER: "com.adguard.dnslibs.adyg"
          KEYCHAIN_PATH: ${{ runner.temp }}/adyg-signing.keychain-db
        run: |
          set -x -e
          security unlock-keychain -p "" "${KEYCHAIN_PATH}"
          codesign -s "${CODESIGN_IDENTITY}" -i "${CODESIGN_IDENTIFIER}" \
            --keychain "${KEYCHAIN_PATH}" --options=runtime build_universal/adyg

      - name: Notarize adyg
        uses: AdGuardSoftwareLimited/actions/actions/notarize-macos-app@master
        with:
          bundle_path: ${{ github.workspace }}/build_universal/adyg
          vault_url: ${{ vars.VAULT_URL }}

      - name: GPG sign and package
        env:
          VERSION: ${{ needs.version.outputs.value }}
          GPG_KEY: devteam@adguard.com
        run: |
          set -x -e
          pushd build_universal
            gpg --default-key "${GPG_KEY}" --detach-sig \
                --passphrase "${GPG_PASSWORD}" --pinentry-mode loopback \
                adyg
            cp ../LICENSE.md .

            NAME=adyg-v${VERSION}-macos-universal
            tar zcf ${NAME}.tar.gz -s ",^,${NAME}/," \
              adyg adyg.sig LICENSE.md
          popd

      # Print sccache counters and decide whether to force-save the store: the
      # save action skips the upload when the key already exists, so the store
      # would freeze after the first run. force=true whenever sccache wrote new
      # entries this run, so source-only changes accumulate.
      - name: sccache stats
        id: sccache-stats
        if: always()
        shell: bash
        run: |
          sccache --show-stats || true
          cache_writes=$(sccache --show-stats --stats-format=json 2>/dev/null \
            | grep -o '"cache_writes":[0-9]*' | grep -o '[0-9]*' || echo 0)
          if [ "$cache_writes" -gt 0 ] 2>/dev/null; then
            echo "force=true" >> "$GITHUB_OUTPUT"
          else
            echo "force=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Save sccache store
        if: always()
        uses: AdGuardSoftwareLimited/actions/actions/registry-cache/save@master
        with:
          config: ${{ secrets.REGISTRY_CACHE_AUTH }}
          key: sccache-adyg-mac-${{ hashFiles('conanfile.py') }}
          path: ${{ env.SCCACHE_DIR }}
          force: ${{ steps.sccache-stats.outputs.force }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-macos
          path: build_universal/adyg-*.tar.gz
          if-no-files-found: error
          retention-days: 7

      - name: Upload to Conan and cleanup
        if: always()
        env:
          ARTIFACTORY_USER: ${{ secrets.ARTIFACTORY_USER }}
          ARTIFACTORY_API_KEY: ${{ secrets.ARTIFACTORY_API_KEY }}
        run: |
          set -x
          source ./venv/bin/activate
          conan remote login art "$ARTIFACTORY_USER" --password "$ARTIFACTORY_API_KEY" || true
          conan upload -r art -c "*" 2>&1 | grep --line-buffered "Uploading" || true

  build-windows:
    name: Windows adyg build
    if: github.repository == 'AdGuardSoftwareLimited/dns-libs'
    needs: [resolve-images, version]
    runs-on:
      - ephemeral
      - ephemeral-vmwin
      - ${{ needs.resolve-images.outputs.windows }}
      - ephemeral-limit-memory-6144
      - ephemeral-limit-cpu-6
    permissions:
      contents: read
      id-token: write
    env:
      # sccache local-disk store, restored/saved across runs by the
      # registry-cache action as an OCI registry blob. SCCACHE_CACHE_SIZE caps
      # the on-disk store (and thus the per-key blob) so a force-save stays
      # bounded.
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      SCCACHE_CACHE_SIZE: 512M
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          # The version comes from the `version` job; full history + tags are
          # kept so cmake/version.cmake's own git describe fallback still works.
          fetch-depth: 0

      # sccache wraps cl.exe so the adyg objects are reused
      # across runs. The binary is installed by AdguardTeam/sccache-action
      # (binary only); the local SCCACHE_DIR store is restored here and saved
      # after the build.
      - name: Configure sccache
        uses: AdguardTeam/sccache-action@main

      - name: Restore sccache store
        uses: AdGuardSoftwareLimited/actions/actions/registry-cache/restore@master
        with:
          config: ${{ secrets.REGISTRY_CACHE_AUTH }}
          # Per-job prefix + conanfile.py hash so the store resets when the
          # dependency graph changes. sccache is content-addressed, so
          # source-only changes accumulate without invalidating the key.
          key: sccache-adyg-windows-${{ hashFiles('conanfile.py') }}
          path: ${{ env.SCCACHE_DIR }}

      - name: Build
        env:
          CONAN_REPO_URL: ${{ vars.CONAN_REPO_URL }}
          # Read by cmake/version.cmake (also drives the Win32 RC resource).
          DNS_LIBS_VERSION: ${{ needs.version.outputs.value }}
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          & conan remote add --index 0 art $Env:CONAN_REPO_URL

          # Save vcvars to switch between them.
          $vcvars32 = cmd /c "vcvarsamd64_x86 & set"
          $vcvars64 = cmd /c "vcvars64 & set"
          $vcvarsarm64 = cmd /c "vcvarsamd64_arm64 & set"
          function setvar($_) {
            if ($_ -match "=") {
              $v = $_.split("="); set-item -force -path "ENV:\$($v[0])"  -value "$($v[1])"
            }
          }

          New-Item -ItemType Directory -Force -Path unsigned | Out-Null

          function Build([string]$BuildDir, $VcvarsEnv, [string]$ArchName) {
            & {
              $VcvarsEnv | foreach { setvar $_ }
              # GNU make is not part of the Windows image, so the Windows job
              # drives the msvc-relwithdebinfo preset through cmake directly.
              # Every architecture uses the same preset, so each one is
              # configured into its own directory.
              # CMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded switches cl.exe
              # from /Zi to /Z7: sccache discards /FS, so a shared per-target
              # PDB fails with C1041 under parallel ninja.
              & cmake --preset msvc-relwithdebinfo -B $BuildDir `
                -DCMAKE_C_COMPILER_LAUNCHER=sccache `
                -DCMAKE_CXX_COMPILER_LAUNCHER=sccache `
                -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded
              if (!$?) { exit 1 }
              & cmake --build $BuildDir --target adyg
              if (!$?) { exit 1 }
            }

            # Collect the unsigned executables; they are signed by the reusable
            # sign-by-signer.yml workflow (sign-windows job) and packaged by
            # package-windows.
            New-Item -ItemType Directory -Force -Path "unsigned\$ArchName" | Out-Null
            Copy-Item -Force "$BuildDir\tools\adyg\adyg.exe" "unsigned\$ArchName\adyg.exe"
          }

          Build "build64" $vcvars64 "x86_64"
          Build "build32" $vcvars32 "i686"
          Build "buildarm64" $vcvarsarm64 "aarch64"

      # Print sccache counters and decide whether to force-save the store: the
      # save action skips the upload when the key already exists, so the store
      # would freeze after the first run. force=true whenever sccache wrote new
      # entries this run, so source-only changes accumulate.
      - name: sccache stats
        id: sccache-stats
        if: always()
        shell: powershell
        run: |
          & sccache --show-stats
          $LASTEXITCODE = 0
          $json = (& sccache --show-stats --stats-format=json) 2>$null
          if ($json) {
            $stats = $json | ConvertFrom-Json
            $cacheWrites = [int]$stats.stats.cache_writes
          } else {
            $cacheWrites = 0
          }
          if ($cacheWrites -gt 0) {
            echo "force=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "force=false" >> $env:GITHUB_OUTPUT
          }

      - name: Save sccache store
        if: always()
        uses: AdGuardSoftwareLimited/actions/actions/registry-cache/save@master
        with:
          config: ${{ secrets.REGISTRY_CACHE_AUTH }}
          key: sccache-adyg-windows-${{ hashFiles('conanfile.py') }}
          path: ${{ env.SCCACHE_DIR }}
          force: ${{ steps.sccache-stats.outputs.force }}

      - name: Upload unsigned executables
        uses: actions/upload-artifact@v7
        with:
          name: adyg-windows-exe-unsigned
          path: unsigned/
          if-no-files-found: error
          retention-days: 7

      - name: Upload to Conan and cleanup
        if: always()
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          & conan remote login art "${{ secrets.ARTIFACTORY_USER }}" --password "${{ secrets.ARTIFACTORY_API_KEY }}"
          & conan upload -r art -c "*" 2>&1 | Select-String "Uploading" -SimpleMatch

  sign-windows:
    name: Sign Windows binaries
    needs: build-windows
    if: github.repository == 'AdGuardSoftwareLimited/dns-libs'
    permissions:
      contents: read
      id-token: write
    uses: AdGuardSoftwareLimited/actions/.github/workflows/sign-by-signer.yml@master
    with:
      team: corelibs
      artifact-name: adyg-windows-exe-unsigned
      files: '**/*.exe'
      signed-artifact-name: adyg-windows-exe-signed

  package-windows:
    name: Package Windows release
    needs: [sign-windows, version]
    if: github.repository == 'AdGuardSoftwareLimited/dns-libs'
    runs-on: [team-corelibs]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          # The version comes from the `version` job; full history + tags are
          # kept so cmake/version.cmake's own git describe fallback still works.
          fetch-depth: 0

      - name: Retrieve GPG signing secrets
        uses: hashicorp/vault-action@v4
        with:
          url: ${{ vars.VAULT_URL }}
          method: jwt
          role: gpg-signing
          secrets: |
            secret/data/ci-secrets/gpg-signing gpgSecretKey | GPG_SECRET_KEY ;
            secret/data/ci-secrets/gpg-signing gpgPassword | GPG_PASSWORD

      - name: Download signed executables
        uses: actions/download-artifact@v8
        with:
          name: adyg-windows-exe-signed
          path: signed

      - name: Import GPG key
        run: |
          echo "${GPG_SECRET_KEY}" | sed -e 'N;s/\(BEGIN PGP PRIVATE KEY BLOCK-----\n\)\(.\)/\1\n\2/' | gpg --import --batch --yes

      # GPG-sign the Authenticode-signed executables (so the signature covers
      # exactly the bytes that ship) and zip each architecture.
      - name: Package
        env:
          GPG_KEY: devteam@adguard.com
          VERSION: ${{ needs.version.outputs.value }}
        run: |
          set -e -x

          mkdir -p artifacts

          package() {
            local arch="$1"
            local name="adyg-v${VERSION}-windows-${arch}"
            local stage="stage/${arch}"
            mkdir -p "${stage}"
            cp "signed/${arch}/adyg.exe" "${stage}/adyg.exe"
            cp LICENSE.md                "${stage}/LICENSE.md"
            gpg --default-key "${GPG_KEY}" --detach-sig \
                --passphrase "${GPG_PASSWORD}" --pinentry-mode loopback \
                "${stage}/adyg.exe"
            # Flat zip (files at the archive root).
            ( cd "${stage}" && zip -q -X "${GITHUB_WORKSPACE}/artifacts/${name}.zip" \
                adyg.exe adyg.exe.sig LICENSE.md )
          }

          package x86_64
          package i686
          package aarch64

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-windows
          path: artifacts/adyg-*.zip
          if-no-files-found: error
          retention-days: 7

# =============================================================================
# Stage 2: Collect all platform archives into a single artifact
# =============================================================================

  collect:
    name: Collect release artifacts
    needs: [build-linux, build-macos, package-windows]
    if: github.repository == 'AdGuardSoftwareLimited/dns-libs'
    runs-on: [team-corelibs]
    permissions:
      contents: read
    steps:
      - name: Download all platform archives
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: Upload combined release artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: artifacts/adyg-*
          if-no-files-found: error
          retention-days: 7
