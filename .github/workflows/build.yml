name: Build library and run tests

on:
  push:
    branches:
      - master
      - 'stable-*'
      - 'dev-*'
  pull_request:
  workflow_dispatch:
  workflow_call:
    inputs:
      version:
        description: 'Version name to set'
        required: true
        type: string

jobs:
  # Resolve the build version and expose it to the platform jobs as the
  # DNS_LIBS_VERSION env var; each toolchain bakes it in (CMake/Gradle/MSBuild).
  # An empty value (untagged) lets each toolchain fall back to its own
  # git describe / 0.0.0-git.
  version:
    name: Resolve version
    if: github.repository == 'AdGuardSoftwareLimited/dns-libs'
    runs-on: [team-corelibs]
    outputs:
      value: ${{ steps.resolve.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history is needed to tell whether this branch introduced the
          # latest CHANGELOG version.
          fetch-depth: 0

      - name: Resolve version
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          case "$EVENT_NAME" in
            workflow_call)
              # publish-release passes the exact release version.
              value="$INPUT_VERSION"
              ;;
            pull_request)
              # The PR that adds the CHANGELOG heading builds the bare release
              # version; any other PR build gets a git-describe prerelease.
              latest=$(sed -nE '/^## \[[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?\]/{s/^## \[([0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?)\].*/\1/p;q;}' CHANGELOG.md)
              [ -n "$latest" ] || { echo "No version found in CHANGELOG.md" >&2; exit 1; }
              commit=$(git log -1 --format=%H -S"## [$latest]" -- CHANGELOG.md 2>/dev/null || true)
              if [ -n "$commit" ] && ! git merge-base --is-ancestor "$commit" "$BASE_SHA" 2>/dev/null; then
                value="$latest"
              else
                value=$(git describe --tags --match 'v*' 2>/dev/null | sed -e 's/^v//' || true)
              fi
              ;;
            *)
              # Branch push or manual dispatch.
              value=$(git describe --tags --match 'v*' 2>/dev/null | sed -e 's/^v//' || true)
              ;;
          esac

          echo "Resolved version: ${value:-(empty)}"
          echo "value=${value}" >> "$GITHUB_OUTPUT"

  resolve-images:
    if: github.repository == 'AdGuardSoftwareLimited/dns-libs'
    uses: AdGuardSoftwareLimited/native-libs-common/.github/workflows/resolve-images.yml@master

  linux-build:
    name: Linux build and tests
    if: github.repository == 'AdGuardSoftwareLimited/dns-libs'
    needs: [resolve-images]
    permissions:
      contents: read
      id-token: write
    secrets:
      test-env: |
        ARTIFACTORY_USER=${{ secrets.ARTIFACTORY_USER }}
        ARTIFACTORY_API_KEY=${{ secrets.ARTIFACTORY_API_KEY }}
    uses: AdGuardSoftwareLimited/actions/.github/workflows/junit-tests.yml@master
    with:
      runs-on: |
        ephemeral
        ephemeral-linux
        ${{ needs.resolve-images.outputs.corelibs-builder }}
        ephemeral-limit-memory-12288
        ephemeral-limit-cpu-8
        ephemeral-run-id-${{ github.run_id }}
      container-image: 'adguard/core-libs:2.11'
      test-command: |
        set -e
        set -x

        python3 -m pip install conan --upgrade
        conan remote add --index 0 art ${{ vars.CONAN_REPO_URL }} || true

        # TODO: run `make lint` instead of `make lint-cpp` once the builds
        # are switched to a local Dockerfile, where the dependency layers
        # (including Node.js/npm, needed to run `npx -y markdownlint-cli2`
        # used by the `lint-md` target) can be cached.
        make lint-cpp
        rm -rf build

        # Run the full test suite (including the real-network integration
        # tests) in the sanitized Debug CI configuration via the `test-ci`
        # Makefile target, which builds the tests and runs ctest with
        # DNSLIBS_INTEGRATION_TESTS=1, a JUnit XML report at build/junit.xml
        # and the CDash ExperimentalTest step.
        #
        # lld keeps link times reasonable under AddressSanitizer; the
        # container-overflow detection is disabled to avoid false positives
        # from libc++ allocations in the CI container.
        #
        # TODO(scheduled-builds): running the real-network integration tests
        # on every push and pull request is wasteful and prone to flakes
        # caused by transient public-DNS failures. Consider moving
        # `make test-ci` to a scheduled (cron) build and running the offline
        # `make test` target on push and pull request events instead.
        export LDFLAGS=-fuse-ld=lld
        export ASAN_OPTIONS=detect_container_overflow=0
        BUILD_TYPE=debug SANITIZE=yes SKIP_BOOTSTRAP=1 make test-ci
      finally-script: |
        set -e
        set -x

        conan remote login art "$ARTIFACTORY_USER" --password "$ARTIFACTORY_API_KEY"
        conan upload -r art -c "*" 2>&1 | grep --line-buffered "Uploading"
      results-path: 'build/junit.xml'
      artifact-name: 'test-results-linux'

  mac-build:
    name: Apple framework build
    if: github.repository == 'AdGuardSoftwareLimited/dns-libs'
    needs: [version, resolve-images]
    runs-on:
      - ephemeral
      - ephemeral-mac
      - ${{ needs.resolve-images.outputs.macos }}
      - ephemeral-limit-memory-6144
      - ephemeral-limit-cpu-4
      - ephemeral-run-id-${{ github.run_id }}
    env:
      # Resolved once; the framework CMake build reads it via cmake/version.cmake
      # (env fallback) for both the version.h header and the Mach-O VERSION.
      DNS_LIBS_VERSION: ${{ needs.version.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # This job only produces the deployable AGDnsProxy.xcframework: it
      # cross-compiles the framework for 5 slices (macos-x86_64, macos-arm64,
      # ios-arm64, iphonesimulator-x86_64, iphonesimulator-arm64) via
      # build_dnsproxy_framework.sh and packages the xcframework/podspec/SwiftPM
      # artifacts. Unlike the Linux and Windows jobs, it runs NO tests — not the
      # native C++ ctest suite (which Linux/Windows run via `make test-ci` /
      # `ctest`), and not the Obj-C framework `test_*.mm` tests defined in
      # platform/mac/framework/CMakeLists.txt (gated on TARGET_OS=macos, and
      # never built here since only `ninja AGDnsProxy` runs per slice).
      #
      # TODO(mac-tests): consider running a native macOS `make test-ci` (root
      # CMake project, `DNSLIBS_INTEGRATION_TESTS=1`) and/or the Obj-C framework
      # tests as a separate mac-test job. The real-network integration tests are
      # better suited to a scheduled build — see the matching TODO(scheduled-
      # builds) comments in the Linux/Windows jobs and the Makefile `test-ci`
      # target.
      - name: Build xcframework
        run: |
          set -e
          set -x

          rm -rf venv
          python3 -m venv venv
          source ./venv/bin/activate

          python3 -m pip install conan
          conan remote add --index 0 art ${{ vars.CONAN_REPO_URL }} || true

          export DNS_LIBS_DIR="${PWD}"
          cd platform/mac
          mkdir -p build
          cd build
          export SRCROOT="${PWD}"

          ../framework/build_dnsproxy_framework.sh --os all
          deactivate

      # Build the three deploy-ready payloads. The directory layout inside each
      # artifact is the remote path the AK deploy workflows publish to verbatim,
      # so it must match exactly:
      #   apple-xcframework : core.dns-libs/<version>/AGDnsProxy.zip (generic -> apple-bin)
      #   apple-podspec     : AGDnsProxy/<version>/AGDnsProxy.podspec.json (generic -> pods)
      #   apple-swiftpm     : core/dns-libs/<version>.zip            (swift   -> swift-pkgs)
      - name: Package Apple deploy artifacts
        id: pkg
        if: needs.version.outputs.value != ''
        env:
          VERSION: ${{ needs.version.outputs.value }}
          AK_BASE: ${{ vars.ARTIFACT_KEEPER_URL }}
        run: |
          set -e
          set -x

          # Full version (incl. any prerelease suffix) resolved by the version
          # job. The Apple package paths/specs carry the full version, while the
          # framework's internal CMake VERSION holds the numeric core.
          VER="${VERSION}"

          # The xcframework zip, referenced (by URL) from both the podspec and the
          # SwiftPM manifest. Bundle the dSYMs, changelog and license alongside it.
          cd platform/mac/build/framework
          echo "#${VER}" > CHANGELOG
          cp "${GITHUB_WORKSPACE}/LICENSE.md" LICENSE
          zip -4yr AGDnsProxy.zip AGDnsProxy.xcframework AGDnsProxy.dSYMs CHANGELOG LICENSE
          cd "$GITHUB_WORKSPACE"

          STAGE="$GITHUB_WORKSPACE/apple-deploy"
          XCF_DIR="$STAGE/apple-xcframework/core.dns-libs/${VER}"
          POD_DIR="$STAGE/apple-podspec/AGDnsProxy/${VER}"
          SPM_DIR="$STAGE/apple-swiftpm/core/dns-libs"
          mkdir -p "$XCF_DIR" "$POD_DIR" "$SPM_DIR"
          mv platform/mac/build/framework/AGDnsProxy.zip "$XCF_DIR/AGDnsProxy.zip"

          # Checksum of the exact zip we publish, for the SwiftPM binaryTarget.
          CHECKSUM=$(shasum -a 256 "$XCF_DIR/AGDnsProxy.zip" | awk '{print $1}')

          # Podspec: fill in the version and the Artifact Keeper base URL.
          sed -e "s#@VERSION@#${VER}#g" -e "s#@AK_BASE@#${AK_BASE}#g" \
            platform/mac/packaging/AGDnsProxy.podspec.json \
            > "$POD_DIR/AGDnsProxy.podspec.json"

          # Package.swift: fill in version, base URL and checksum, then zip as the
          # SwiftPM registry expects ({scope}/{package}/{version}.zip). The package
          # contents live under a single top-level directory so SwiftPM's
          # stripFirstLevel extraction has one root directory to strip.
          PKG_TMP=$(mktemp -d)
          mkdir -p "$PKG_TMP/dns-libs"
          sed -e "s#@VERSION@#${VER}#g" -e "s#@AK_BASE@#${AK_BASE}#g" -e "s#@CHECKSUM@#${CHECKSUM}#g" \
            platform/mac/packaging/Package.swift \
            > "$PKG_TMP/dns-libs/Package.swift"
          (cd "$PKG_TMP" && zip -4r "$SPM_DIR/${VER}.zip" dns-libs)

      - name: Upload xcframework artifact
        if: needs.version.outputs.value != ''
        uses: actions/upload-artifact@v7
        with:
          name: apple-xcframework
          path: apple-deploy/apple-xcframework
          if-no-files-found: error
          retention-days: 7

      - name: Upload podspec artifact
        if: needs.version.outputs.value != ''
        uses: actions/upload-artifact@v7
        with:
          name: apple-podspec
          path: apple-deploy/apple-podspec
          if-no-files-found: error
          retention-days: 7

      - name: Upload SwiftPM artifact
        if: needs.version.outputs.value != ''
        uses: actions/upload-artifact@v7
        with:
          name: apple-swiftpm
          path: apple-deploy/apple-swiftpm
          if-no-files-found: error
          retention-days: 7

      - name: Upload to Conan
        if: always()
        run: |
          source ./venv/bin/activate
          conan remote login art "${{ secrets.ARTIFACTORY_USER }}" --password "${{ secrets.ARTIFACTORY_API_KEY }}"
          conan upload -r art -c "*" 2>&1 | grep --line-buffered "Uploading"

  android-build:
    name: Android library build
    if: github.repository == 'AdGuardSoftwareLimited/dns-libs'
    needs: [version, resolve-images]
    runs-on:
      - ephemeral
      - ephemeral-linux
      - ${{ needs.resolve-images.outputs.corelibs-builder }}
      - ephemeral-limit-memory-8192
      - ephemeral-limit-cpu-8
      - ephemeral-run-id-${{ github.run_id }}-android
    container:
      image: adguard/core-libs:2.11
    env:
      M2_LOCAL_REPO: ${{ github.workspace }}/.m2/repository
      # Read by build.gradle (resolveDnsLibsVersion) and forwarded to the native
      # CMake build as -DDNS_LIBS_VERSION.
      DNS_LIBS_VERSION: ${{ needs.version.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build AAR and publish to local Maven
        working-directory: platform/android/dnsproxy
        run: |
          set -e
          set -x

          python3 -m pip install conan --upgrade
          conan remote add --index 0 art ${{ vars.CONAN_REPO_URL }} || true

          touch local.properties
          CMAKE_DIR=$(dirname $(dirname $(which cmake)))
          echo cmake.dir=$CMAKE_DIR >> local.properties

          ./gradlew :lib:assembleRelease publishToMavenLocal \
              -Dmaven.repo.local="$M2_LOCAL_REPO"

          find "$M2_LOCAL_REPO" -name 'maven-metadata-local.xml' -delete

      - name: Upload Android artifactory payload
        uses: actions/upload-artifact@v7
        with:
          name: android-artifactory-payload
          path: ${{ env.M2_LOCAL_REPO }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload to Conan
        if: always()
        run: |
          conan remote login art "${{ secrets.ARTIFACTORY_USER }}" --password "${{ secrets.ARTIFACTORY_API_KEY }}"
          conan upload -r art -c "*" 2>&1 | grep --line-buffered "Uploading"

  windows-build:
    name: Windows build, tests and nuget pack
    if: github.repository == 'AdGuardSoftwareLimited/dns-libs'
    needs: [version, resolve-images]
    runs-on:
      - ephemeral
      - ephemeral-vmwin
      - ${{ needs.resolve-images.outputs.windows }}
      - ephemeral-limit-memory-6144
      - ephemeral-limit-cpu-4
      - ephemeral-run-id-${{ github.run_id }}
    env:
      # Read by cmake/version.cmake (the RC resource) and by
      # Directory.Build.targets (the C# assembly version attributes).
      DNS_LIBS_VERSION: ${{ needs.version.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build C and C# library and run tests
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          & conan remote add --index 0 art ${{ vars.CONAN_REPO_URL }}

          # Save vcvars to switch between them
          $vcvars32 = cmd /c "vcvarsamd64_x86 & set"
          $vcvars64 = cmd /c "vcvars64 & set"
          $vcvarsarm64 = cmd /c "vcvarsamd64_arm64 & set"
          function setvar($_) {
            if ($_ -match "=") {
              $v = $_.split("="); set-item -force -path "ENV:\$($v[0])"  -value "$($v[1])"
            }
          }

          cd platform/windows/capi
          & {
            $vcvars32 | foreach { setvar $_ }
            mkdir build
            pushd build
            & cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo `
              -DCMAKE_USE_OPENSSL=ON `
              -DCMAKE_C_COMPILER="cl.exe" `
              -DCMAKE_CXX_COMPILER="cl.exe" `
              -G Ninja ..
            if (!$?) { exit 1 }
            & ninja AdguardDns
            if (!$?) { exit 1 }
            & ninja tests
            if (!$?) { exit 1 }
            # Run the real-network integration tests (DoT/DoH/DoQ/DNSCrypt)
            # alongside the offline suite. The capi build lives in its own
            # source tree, so it cannot reuse the root `make test-ci` target
            # the Linux job uses.
            #
            # TODO(scheduled-builds): running the real-network integration
            # tests on every push and pull request is wasteful and prone to
            # flakes caused by transient public-DNS failures. Consider moving
            # them to a scheduled (cron) build and running only the offline
            # tests on push and pull request events instead.
            $Env:DNSLIBS_INTEGRATION_TESTS = "1"
            & ctest -D ExperimentalTest --no-compress-output
            if (!$?) { exit 1 }
            popd
          }
          & {
            $vcvars64 | foreach { setvar $_ }
            mkdir build64
            pushd build64
            & cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo `
              -DCMAKE_USE_OPENSSL=ON `
              -DCMAKE_C_COMPILER="cl.exe" `
              -DCMAKE_CXX_COMPILER="cl.exe" `
              -G Ninja ..
            if (!$?) { exit 1 }
            & ninja AdguardDns64
            if (!$?) { exit 1 }
            popd
          }
          & {
            $vcvarsarm64 | foreach { setvar $_ }
            mkdir buildarm64
            pushd buildarm64
            & cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo `
              -DCMAKE_USE_OPENSSL=ON `
              -DCMAKE_C_COMPILER="cl.exe" `
              -DCMAKE_CXX_COMPILER="cl.exe" `
              -DCMAKE_SYSTEM_NAME=Windows `
              -DCMAKE_SYSTEM_PROCESSOR=ARM64 `
              -G Ninja ..
            if (!$?) { exit 1 }
            & ninja AdguardDnsArm64
            if (!$?) { exit 1 }
            popd
          }

          cd ../cs/Adguard.Dns
          Remove-Item *.nupkg -Force -ErrorAction SilentlyContinue
          & nuget sources add -Name Artifactory -Source "${{ vars.NUGET_REPO_URL }}"
          if (!$?) { exit 1 }
          ${Env:NUGET_PACKAGES}="$(pwd)/packages"
          & nuget restore
          if (!$?) { exit 1 }

          # Skip strong name verification
          & sn -Vr *
          if (!$?) { exit 1 }
          # Run C# tests
          & msbuild Adguard.Dns.Tests /t:Build /t:Test /p:Configuration=Release /p:Platform=AnyCPU
          if (!$?) { exit 1 }
          # Build the NuGet package
          & nuget pack Adguard.Dns -p Configuration=Release -p Platform=AnyCPU
          if (!$?) { exit 1 }

      - name: Upload C++ test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-windows
          path: '**/Testing/*/*.xml'
          retention-days: 7

      - name: Upload C# test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-windows-cs
          path: '**/Adguard.Dns.Tests/TestResult.xml'
          retention-days: 7

      - name: Upload nuget package
        uses: actions/upload-artifact@v7
        with:
          name: windows-nupkg
          path: platform/windows/cs/Adguard.Dns/*.nupkg
          if-no-files-found: error
          retention-days: 7

      - name: Upload to Conan
        if: always()
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          & conan remote login art "${{ secrets.ARTIFACTORY_USER }}" --password "${{ secrets.ARTIFACTORY_API_KEY }}"
          & conan upload -r art -c "*" 2>&1 | Select-String "Uploading" -SimpleMatch
