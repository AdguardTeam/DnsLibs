name: Build library and run tests

on:
  push:
    branches:
      - master
      - 'stable-*'
      - 'dev-*'
  pull_request:
  workflow_dispatch:
  workflow_call:
    inputs:
      version:
        description: 'Version name to set'
        required: true
        type: string

jobs:
  # Resolve the build version and expose it to the platform jobs as the
  # DNS_LIBS_VERSION env var; each toolchain bakes it in (CMake/Gradle/MSBuild).
  # An empty value (untagged) lets each toolchain fall back to its own
  # git describe / 0.0.0-git.
  version:
    name: Resolve version
    if: github.repository == 'AdGuardSoftwareLimited/dns-libs'
    runs-on: [team-corelibs]
    outputs:
      value: ${{ steps.resolve.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history is needed to tell whether this branch introduced the
          # latest CHANGELOG version.
          fetch-depth: 0

      - name: Resolve version
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          case "$EVENT_NAME" in
            workflow_call)
              # publish-release passes the exact release version.
              value="$INPUT_VERSION"
              ;;
            pull_request)
              # The PR that adds the CHANGELOG heading builds the bare release
              # version; any other PR build gets a git-describe prerelease.
              latest=$(sed -nE '/^## \[[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?\]/{s/^## \[([0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?)\].*/\1/p;q;}' CHANGELOG.md)
              [ -n "$latest" ] || { echo "No version found in CHANGELOG.md" >&2; exit 1; }
              commit=$(git log -1 --format=%H -S"## [$latest]" -- CHANGELOG.md 2>/dev/null || true)
              if [ -n "$commit" ] && ! git merge-base --is-ancestor "$commit" "$BASE_SHA" 2>/dev/null; then
                value="$latest"
              else
                value=$(git describe --tags --match 'v*' 2>/dev/null | sed -e 's/^v//' || true)
              fi
              ;;
            *)
              # Branch push or manual dispatch.
              value=$(git describe --tags --match 'v*' 2>/dev/null | sed -e 's/^v//' || true)
              ;;
          esac

          echo "Resolved version: ${value:-(empty)}"
          echo "value=${value}" >> "$GITHUB_OUTPUT"

  resolve-images:
    if: github.repository == 'AdGuardSoftwareLimited/dns-libs'
    uses: AdGuardSoftwareLimited/native-libs-common/.github/workflows/resolve-images.yml@master

  # Builds the libraries, runs the full test suite (including integration tests),
  # and uploads the dns-libs Conan binary package to Artifactory.
  linux-build:
    name: Linux build and tests
    if: github.repository == 'AdGuardSoftwareLimited/dns-libs'
    needs: [resolve-images]
    permissions:
      contents: read
      id-token: write
    runs-on:
      - ephemeral
      - ephemeral-linux
      - ${{ needs.resolve-images.outputs.corelibs-builder }}
      - ephemeral-limit-memory-12288
      - ephemeral-limit-cpu-8
      - ephemeral-run-id-${{ github.run_id }}
    container:
      image: adguard/core-libs:2.11
    env:
      # sccache local-disk store, snapshotted across runs by the registry-cache
      # action. 512M caps the store (and thus the per-key OCI blob) so a
      # force-save (when cache_writes > 0) stays bounded. Current stores are
      # 98–289MB; sccache LRU-evicts stale entries when it fills.
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      SCCACHE_CACHE_SIZE: 512M
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # sccache wraps clang/clang++ so both the Debug+ASan test build and the
      # Release conan package build reuse compiled objects across runs.
      # CMAKE_LAUNCHER=sccache forwards to -DCMAKE_*_COMPILER_LAUNCHER for
      # the `make test-ci` build; the conan create step injects the same
      # launchers via tools.cmake.cmaketoolchain:extra_variables.
      - name: Configure sccache
        uses: AdguardTeam/sccache-action@main

      # The sccache stores stay on the explicit restore + save pair rather than
      # the combined registry-cache action (whose post step saves by itself, as
      # the venv caches above use): the combined action never re-uploads after a
      # restore, which would freeze the store on the first run. This store has to
      # keep growing, so the save below re-uploads with force=true whenever
      # sccache wrote new entries -- and force on the combined action would also
      # skip the restore.
      - name: Restore sccache store
        uses: AdGuardSoftwareLimited/actions/actions/registry-cache/restore@master
        with:
          config: ${{ secrets.REGISTRY_CACHE_AUTH }}
          # Per-job prefix + conanfile.py hash so the store resets when the
          # dependency graph changes. sccache is content-addressed, so
          # source-only changes accumulate without invalidating the key.
          key: sccache-linux-${{ hashFiles('conanfile.py') }}
          path: ${{ env.SCCACHE_DIR }}

      - name: Set up Conan
        run: |
          set -e
          set -x

          # Conan is pre-installed in the adguard/core-libs image (2.24.0 at
          # /usr/local/bin/conan), so it is not pip-installed here -- doing so
          # would either be a no-op or silently upgrade conan past the image's
          # pinned version, drifting CI from local `make` builds. Only the
          # Artifactory `art` remote is added.
          conan remote add --index 0 art ${{ vars.CONAN_REPO_URL }} || true

      # Cache the Python venv created by `make clangd-tidy` (via `make lint`
      # -> `lint-cpp` -> `clangd-tidy`) so the three pip packages in
      # requirements.txt (pyyaml, clangd-tidy, tqdm) are not re-downloaded and
      # re-installed from PyPI on every run. Keyed on requirements.txt hash so
      # the cache resets when the Python deps change. On a cache hit the venv
      # already exists; `make clangd-tidy` still runs `python3 -m venv env`
      # (updates the existing venv in place) and `pip install -r requirements.txt`
      # (reports "already satisfied"), so correctness is preserved -- the savings
      # are in network I/O and package installation time.
      #
      # The save runs as this action's post step. save-always keeps it running
      # when the job fails: the venv is created before clangd-tidy runs, so even
      # a lint or test failure leaves a valid, cacheable venv. A restored cache
      # is never re-uploaded.
      - name: Cache Python venv
        uses: AdGuardSoftwareLimited/actions/actions/registry-cache@master
        with:
          config: ${{ secrets.REGISTRY_CACHE_AUTH }}
          key: python-env-linux-${{ hashFiles('requirements.txt') }}
          path: env
          save-always: 'true'

      # Node.js is preinstalled in the adguard/core-libs image (node, npm, npx),
      # so no setup-node step is needed for `make lint-md` (markdownlint-cli2
      # via npx). Adding actions/setup-node is also blocked by the enterprise
      # action allow-list.
      - name: Lint and run tests
        run: |
          set -e
          set -x

          make lint

          # Build and run the full test suite (incl. real-network integration
          # tests) in the sanitized Debug CI configuration. lld keeps link
          # times reasonable under AddressSanitizer; container-overflow
          # detection is disabled to avoid false positives from libc++
          # allocations in the CI container.
          #
          # CMAKE_LAUNCHER=sccache routes clang/clang++ through sccache.
          #
          # TODO(scheduled-builds): running the real-network integration tests
          # on every push and pull request is wasteful and prone to flakes.
          # Consider moving `make test-ci` to a scheduled build and running
          # the offline `make test` target on push/PR events instead.
          export LDFLAGS=-fuse-ld=lld
          export ASAN_OPTIONS=detect_container_overflow=0
          PRESET=clang-debug-sanitizer SKIP_BOOTSTRAP=1 CMAKE_LAUNCHER=sccache make test-ci

      # Upload the Conan packages from the local cache to Artifactory.
      # `make test-ci` builds missing dependencies (--build=missing) into the
      # local cache via the CMake-Conan provider; uploading `*` pushes those
      # dependency binaries back to Artifactory for reuse by the mac/android/
      # windows jobs and later runs. The dns-libs recipe itself is exported and
      # uploaded with a real version by the publish-snapshot/publish-release
      # workflows (scripts/export_conan.sh), so it is not built or uploaded
      # here.
      - name: Upload to Conan
        if: always()
        run: |
          conan remote login art "${{ secrets.ARTIFACTORY_USER }}" --password "${{ secrets.ARTIFACTORY_API_KEY }}"
          conan upload -r art -c "*" 2>&1 | grep --line-buffered "Uploading"

      # Print sccache counters and decide whether to force-save the store.
      # The registry-cache save action skips upload when the key already
      # exists (HEAD-existence check), so after the first run the store is
      # frozen unless force=true. Here we set force=true when sccache wrote
      # new entries to the local store this run (cache_writes > 0), so
      # source-only changes accumulate. When every compile was a cache hit
      # (cache_writes == 0) the local store is unchanged and the save no-ops.
      # `|| true` ignores a non-zero exit (e.g. daemon already exited). Runs
      # `if: always()` so stats still print on failure.
      - name: sccache stats
        id: sccache-stats
        if: always()
        run: |
          sccache --show-stats || true
          cache_writes=$(sccache --show-stats --stats-format=json 2>/dev/null \
            | grep -o '"cache_writes":[0-9]*' | grep -o '[0-9]*' || echo 0)
          if [ "$cache_writes" -gt 0 ] 2>/dev/null; then
            echo "force=true" >> "$GITHUB_OUTPUT"
          else
            echo "force=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Save sccache store
        if: always()
        uses: AdGuardSoftwareLimited/actions/actions/registry-cache/save@master
        with:
          config: ${{ secrets.REGISTRY_CACHE_AUTH }}
          key: sccache-linux-${{ hashFiles('conanfile.py') }}
          path: ${{ env.SCCACHE_DIR }}
          force: ${{ steps.sccache-stats.outputs.force }}

      # Upload the JUnit XML from `make test-ci`. `if-no-files-found: warn`
      # because a build failure (before ctest runs) leaves no junit.xml.
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-linux
          # `make test-ci` runs the clang-debug-sanitizer preset, which
          # configures into cmake-build-<preset name>/ (see CMakePresets.json).
          path: cmake-build-clang-debug-sanitizer/junit.xml
          if-no-files-found: warn
          retention-days: 7

  mac-build:
    name: Apple framework build
    if: github.repository == 'AdGuardSoftwareLimited/dns-libs'
    needs: [version, resolve-images]
    runs-on:
      - ephemeral
      - ephemeral-mac
      - ${{ needs.resolve-images.outputs.macos }}
      - ephemeral-limit-memory-6144
      - ephemeral-limit-cpu-4
      - ephemeral-run-id-${{ github.run_id }}
    env:
      # Resolved once; the framework CMake build reads it via cmake/version.cmake
      # (env fallback) for both the version.h header and the Mach-O VERSION.
      DNS_LIBS_VERSION: ${{ needs.version.outputs.value }}
      # sccache local-disk store, restored/saved across runs by the
      # registry-cache action
      # (AdGuardSoftwareLimited/actions/actions/registry-cache) as an OCI
      # registry blob. sccache uses its local filesystem cache at SCCACHE_DIR;
      # SCCACHE_CACHE_SIZE caps the on-disk store (and thus the per-key OCI
      # blob) so a force-save stays bounded.
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      SCCACHE_CACHE_SIZE: 512M
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # sccache wraps Apple Clang so the 5 framework slices built by
      # build_dnsproxy_framework.sh (platform/mac/framework/) reuse compiled
      # objects across runs. The sccache binary is installed by
      # AdguardTeam/sccache-action (binary only); the local SCCACHE_DIR store
      # is restored/saved around the build by the registry-cache action below.
      # The CMAKE_C/CXX_COMPILER_LAUNCHER=sccache flags are added to every
      # slice's cmake invocation inside build_dnsproxy_framework.sh (gated on
      # USE_SCCACHE=1).
      - name: Configure sccache
        uses: AdguardTeam/sccache-action@main

      - name: Restore sccache store
        uses: AdGuardSoftwareLimited/actions/actions/registry-cache/restore@master
        with:
          config: ${{ secrets.REGISTRY_CACHE_AUTH }}
          # Per-job prefix (not the repo name -- registry-cache already
          # namespaces by repo via GITHUB_REPOSITORY) + conanfile.py hash so
          # the store resets when the dependency graph changes. sccache is
          # internally content-addressed, so source-only changes accumulate
          # inside a key without invalidating it.
          key: sccache-mac-${{ hashFiles('conanfile.py') }}
          path: ${{ env.SCCACHE_DIR }}

      # This job produces the deployable AGDnsProxy.xcframework (cross-compiled
      # for 5 slices: macos-x86_64, macos-arm64, ios-arm64, iphonesimulator-x86_64,
      # iphonesimulator-arm64 via build_dnsproxy_framework.sh) and the
      # xcframework/podspec/SwiftPM artifacts, and additionally runs the native
      # C++ ctest suite (incl. test_adyg_cli) and builds the adyg CLI binary.
      #
      # Tests run FIRST (before the framework cross-compilation) as a fast gating
      # step: a test failure fails the job before spending time on the five-slice
      # framework build. The native suite runs offline via `make test` (= test-cpp,
      # no DNSLIBS_INTEGRATION_TESTS), so the real-network integration tests stay
      # Linux-only and this step is non-flaky; see the TODO(scheduled-builds)
      # comments elsewhere.
      #
      # The Obj-C framework `test_*.mm` tests (platform/mac/framework/
      # CMakeLists.txt, gated on TARGET_OS=macos) are still NOT run here — only
      # `ninja AGDnsProxy` runs per framework slice.

      # Cache the Conan venv (created below) so Conan is not re-downloaded
      # and re-installed from PyPI on every run. macOS runners do not ship
      # Conan, so without this cache the `pip install conan` below hits PyPI
      # every time. On a cache hit the venv already exists; the "Set up Conan
      # venv" step below skips creation and `pip install conan` reports "already
      # satisfied" (no network I/O). Conan is installed unpinned (latest 2.x);
      # the key includes the conanfile.py hash so any dependency-graph change
      # invalidates the venv and pulls a fresh Conan. To force a manual upgrade,
      # bump the key suffix.
      #
      # The save runs as this action's post step. save-always keeps it running
      # when the job fails: the venv is complete once the setup step below has
      # run, whatever the native tests or the xcframework build do afterwards.
      - name: Cache Conan venv
        uses: AdGuardSoftwareLimited/actions/actions/registry-cache@master
        with:
          config: ${{ secrets.REGISTRY_CACHE_AUTH }}
          key: python-venv-mac-conan-${{ hashFiles('conanfile.py') }}
          path: venv
          save-always: 'true'

      # Create a single Python venv with Conan and the `art` remote once and
      # reuse it across the native test run, the xcframework build, the adyg
      # build and the final Conan upload. Each `run:` step re-activates the
      # venv (GitHub Actions starts a fresh shell per step); the venv directory
      # itself persists in the workspace. The Conan package cache (~/.conan2)
      # is shared across all of these regardless of the active venv, so there
      # is no need for the later steps to recreate it.
      - name: Set up Conan venv
        run: |
          set -e
          set -x

          # Create the venv only if it was not restored by the registry-cache
          # step above -- checking for the activate script (the venv marker)
          # rather than just the directory, so that an empty `venv/` left
          # behind by a cache-miss restore still triggers creation. `python3
          # -m venv` is also safe on an existing venv (it preserves installed
          # packages), but the explicit check makes the cache-hit path obvious
          # and avoids the venv module rewriting the interpreter/pip symlinks
          # unnecessarily.
          if [ ! -f venv/bin/activate ]; then
            python3 -m venv venv
          fi
          source ./venv/bin/activate

          # Install Conan into the venv. macOS runners do not ship Conan, so
          # this is a real PyPI download on a cache miss and a no-op ("already
          # satisfied", no network I/O) on a cache hit.
          python3 -m pip install conan
          conan remote add --index 0 art ${{ vars.CONAN_REPO_URL }} || true

      - name: Run native tests
        run: |
          set -e
          set -x

          # Reuse the venv (Conan + `art` remote) created by the "Set up Conan
          # venv" step. The conan CMake provider fetches the root CMake project's
          # dependencies during configure.
          source ./venv/bin/activate

          # Builds the `tests` target with the default preset
          # (clang-relwithdebinfo), i.e. in cmake-build-clang-relwithdebinfo/,
          # then runs ctest. That directory is separate from the framework's
          # platform/mac/build/, so the two builds never collide.
          #
          # Uses `make test` (= test-cpp), not `make test-ci`: the latter turns
          # on the real-network integration tests (DNSLIBS_INTEGRATION_TESTS=1),
          # kept Linux-only so this step stays non-flaky (see the step-level
          # note above); it also writes a JUnit report and submits to CDash,
          # which only the Linux build job consumes (this is a plain
          # runs-on job), and is meant to pair with the Linux sanitized Debug
          # build (PRESET=clang-debug-sanitizer).
          SKIP_BOOTSTRAP=1 make test

      - name: Build xcframework
        env:
          USE_SCCACHE: "1"
        run: |
          set -e
          set -x

          # Reuse the venv (Conan + `art` remote) created by the "Set up Conan
          # venv" step. The framework script runs `cmake` per slice, and the
          # conan CMake provider fetches each slice's dependencies on configure.
          source ./venv/bin/activate

          export DNS_LIBS_DIR="${PWD}"
          cd platform/mac
          mkdir -p build
          cd build
          export SRCROOT="${PWD}"

          ../framework/build_dnsproxy_framework.sh --os all
          deactivate

      # Print sccache counters and decide whether to force-save the store.
      # See the linux-build job for the full rationale: force=true when
      # cache_writes > 0 (new entries written this run), force=false
      # otherwise (all cache hits, local store unchanged, save no-ops).
      # The later "Build adyg" and "Upload to Conan" steps don't use
      # sccache, so saving right here captures the complete store.
      - name: sccache stats
        id: sccache-stats
        if: always()
        run: |
          sccache --show-stats || true
          cache_writes=$(sccache --show-stats --stats-format=json 2>/dev/null \
            | grep -o '"cache_writes":[0-9]*' | grep -o '[0-9]*' || echo 0)
          if [ "$cache_writes" -gt 0 ] 2>/dev/null; then
            echo "force=true" >> "$GITHUB_OUTPUT"
          else
            echo "force=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Save sccache store
        if: always()
        uses: AdGuardSoftwareLimited/actions/actions/registry-cache/save@master
        with:
          config: ${{ secrets.REGISTRY_CACHE_AUTH }}
          key: sccache-mac-${{ hashFiles('conanfile.py') }}
          path: ${{ env.SCCACHE_DIR }}
          force: ${{ steps.sccache-stats.outputs.force }}

      # Build the three deploy-ready payloads. The directory layout inside each
      # artifact is the remote path the AK deploy workflows publish to verbatim,
      # so it must match exactly:
      #   apple-xcframework : core.dns-libs/<version>/AGDnsProxy.zip (generic -> apple-bin)
      #   apple-podspec     : AGDnsProxy/<version>/AGDnsProxy.podspec.json (generic -> pods)
      #   apple-swiftpm     : core/dns-libs/<version>.zip            (swift   -> swift-pkgs)
      - name: Package Apple deploy artifacts
        id: pkg
        if: needs.version.outputs.value != ''
        env:
          VERSION: ${{ needs.version.outputs.value }}
          AK_BASE: ${{ vars.ARTIFACT_KEEPER_URL }}
        run: |
          set -e
          set -x

          # Full version (incl. any prerelease suffix) resolved by the version
          # job. The Apple package paths/specs carry the full version, while the
          # framework's internal CMake VERSION holds the numeric core.
          VER="${VERSION}"

          # The xcframework zip, referenced (by URL) from both the podspec and the
          # SwiftPM manifest. Bundle the dSYMs, changelog and license alongside it.
          cd platform/mac/build/framework
          echo "#${VER}" > CHANGELOG
          cp "${GITHUB_WORKSPACE}/LICENSE.md" LICENSE
          zip -4yr AGDnsProxy.zip AGDnsProxy.xcframework AGDnsProxy.dSYMs CHANGELOG LICENSE
          cd "$GITHUB_WORKSPACE"

          STAGE="$GITHUB_WORKSPACE/apple-deploy"
          XCF_DIR="$STAGE/apple-xcframework/core.dns-libs/${VER}"
          POD_DIR="$STAGE/apple-podspec/AGDnsProxy/${VER}"
          SPM_DIR="$STAGE/apple-swiftpm/core/dns-libs"
          mkdir -p "$XCF_DIR" "$POD_DIR" "$SPM_DIR"
          mv platform/mac/build/framework/AGDnsProxy.zip "$XCF_DIR/AGDnsProxy.zip"

          # Checksum of the exact zip we publish, for the SwiftPM binaryTarget.
          CHECKSUM=$(shasum -a 256 "$XCF_DIR/AGDnsProxy.zip" | awk '{print $1}')

          # Podspec: fill in the version and the Artifact Keeper base URL.
          sed -e "s#@VERSION@#${VER}#g" -e "s#@AK_BASE@#${AK_BASE}#g" \
            platform/mac/packaging/AGDnsProxy.podspec.json \
            > "$POD_DIR/AGDnsProxy.podspec.json"

          # Package.swift: fill in version, base URL and checksum, then zip as the
          # SwiftPM registry expects ({scope}/{package}/{version}.zip). The package
          # contents live under a single top-level directory so SwiftPM's
          # stripFirstLevel extraction has one root directory to strip.
          PKG_TMP=$(mktemp -d)
          mkdir -p "$PKG_TMP/dns-libs"
          sed -e "s#@VERSION@#${VER}#g" -e "s#@AK_BASE@#${AK_BASE}#g" -e "s#@CHECKSUM@#${CHECKSUM}#g" \
            platform/mac/packaging/Package.swift \
            > "$PKG_TMP/dns-libs/Package.swift"
          (cd "$PKG_TMP" && zip -4r "$SPM_DIR/${VER}.zip" dns-libs)

      - name: Upload xcframework artifact
        if: needs.version.outputs.value != ''
        uses: actions/upload-artifact@v7
        with:
          name: apple-xcframework
          path: apple-deploy/apple-xcframework
          if-no-files-found: error
          retention-days: 7

      - name: Upload podspec artifact
        if: needs.version.outputs.value != ''
        uses: actions/upload-artifact@v7
        with:
          name: apple-podspec
          path: apple-deploy/apple-podspec
          if-no-files-found: error
          retention-days: 7

      - name: Upload SwiftPM artifact
        if: needs.version.outputs.value != ''
        uses: actions/upload-artifact@v7
        with:
          name: apple-swiftpm
          path: apple-deploy/apple-swiftpm
          if-no-files-found: error
          retention-days: 7

      # Build the adyg CLI binary as a step separate from the test run. The
      # "Run native tests" step above already built `adyg` (the `tests` target
      # depends on it) in release mode in the same preset build dir, so this is just a
      # fast incremental rebuild that exists to make "build adyg" a distinct,
      # loggable step from "run tests". Release build (default BUILD_TYPE=release
      # -> RelWithDebInfo) so the uploaded binary matches the Linux adyg artifact.
      # Reuses the shared venv created by the "Set up Conan venv" step.
      - name: Build adyg
        run: |
          set -e
          set -x

          source ./venv/bin/activate

          SKIP_BOOTSTRAP=1 make build_adyg

      - name: Upload adyg binary
        uses: actions/upload-artifact@v7
        with:
          name: adyg-macos
          path: cmake-build-clang-relwithdebinfo/tools/adyg/adyg
          if-no-files-found: error
          retention-days: 7

      - name: Upload to Conan
        if: always()
        run: |
          source ./venv/bin/activate
          conan remote login art "${{ secrets.ARTIFACTORY_USER }}" --password "${{ secrets.ARTIFACTORY_API_KEY }}"
          conan upload -r art -c "*" 2>&1 | grep --line-buffered "Uploading"

  android-build:
    name: Android library build
    if: github.repository == 'AdGuardSoftwareLimited/dns-libs'
    needs: [version, resolve-images]
    runs-on:
      - ephemeral
      - ephemeral-linux
      - ${{ needs.resolve-images.outputs.corelibs-builder }}
      - ephemeral-limit-memory-8192
      - ephemeral-limit-cpu-8
      - ephemeral-run-id-${{ github.run_id }}
    container:
      image: adguard/core-libs:2.11
    env:
      M2_LOCAL_REPO: ${{ github.workspace }}/.m2/repository
      # Read by build.gradle (resolveDnsLibsVersion) and forwarded to the native
      # CMake build as -DDNS_LIBS_VERSION.
      DNS_LIBS_VERSION: ${{ needs.version.outputs.value }}
      # sccache local-disk store, restored/saved across runs by the
      # registry-cache action
      # (AdGuardSoftwareLimited/actions/actions/registry-cache) as an OCI
      # registry blob. SCCACHE_DIR lives under the workspace so it's on the
      # container's writable volume.
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      SCCACHE_CACHE_SIZE: 512M
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # sccache wraps the NDK clang invoked by Gradle's externalNativeBuild so
      # the JNI native libraries (platform/android/dnsproxy/lib) reuse compiled
      # objects across runs and across the 4 ABIs (arm64-v8a, armeabi-v7a, x86,
      # x86_64). The sccache binary is installed by AdguardTeam/sccache-action
      # (binary only); the local SCCACHE_DIR store is restored/saved around the
      # build by the registry-cache action below. The
      # CMAKE_C/CXX_COMPILER_LAUNCHER=sccache flags are appended to the cmake
      # arguments in lib/build.gradle (gated on USE_SCCACHE=1) and so reach
      # every ABI's configure. Note: this job runs in the
      # adguard/core-libs container, so the sccache binary installed above must
      # land on the container PATH (the action writes GITHUB_PATH, which is
      # applied to container steps) -- verify on the first run that sccache is
      # found.
      - name: Configure sccache
        uses: AdguardTeam/sccache-action@main

      - name: Restore sccache store
        uses: AdGuardSoftwareLimited/actions/actions/registry-cache/restore@master
        with:
          config: ${{ secrets.REGISTRY_CACHE_AUTH }}
          # Per-job prefix (not the repo name -- registry-cache already
          # namespaces by repo via GITHUB_REPOSITORY). android runs on Linux
          # (runner.os == "Linux") but uses the NDK clang, so a distinct
          # "sccache-android" prefix keeps it from colliding with the Linux
          # store (the linux-build job's sccache store is keyed
          # "sccache-linux-<conanfile.py hash>" via its own registry-cache
          # restore/save steps -- see linux-build) even though both hash
          # conanfile.py identically. NDK clang and the Linux system clang are
          # different toolchains, so a cache hit on one would still miss the
          # other's store.
          key: sccache-android-${{ hashFiles('conanfile.py') }}
          path: ${{ env.SCCACHE_DIR }}

      - name: Build AAR and publish to local Maven
        working-directory: platform/android/dnsproxy
        env:
          USE_SCCACHE: "1"
        run: |
          set -e
          set -x

          # Conan is pre-installed in the adguard/core-libs image (2.24.0 at
          # /usr/local/bin/conan), so it is not pip-installed here -- doing so
          # would either be a no-op or silently upgrade conan past the image's
          # pinned version, drifting CI from local `make` builds. Only the
          # Artifactory `art` remote is added.
          conan remote add --index 0 art ${{ vars.CONAN_REPO_URL }} || true

          touch local.properties
          CMAKE_DIR=$(dirname $(dirname $(which cmake)))
          echo cmake.dir=$CMAKE_DIR >> local.properties

          ./gradlew :lib:assembleRelease publishToMavenLocal \
              -Dmaven.repo.local="$M2_LOCAL_REPO"

          find "$M2_LOCAL_REPO" -name 'maven-metadata-local.xml' -delete

      # Print sccache counters and decide whether to force-save the store.
      # See the linux-build job for the full rationale: force=true when
      # cache_writes > 0 (new entries written this run), force=false
      # otherwise (all cache hits, local store unchanged, save no-ops).
      # The native build is the only sccache-using step in this job, so
      # saving right here captures the complete store.
      - name: sccache stats
        id: sccache-stats
        if: always()
        run: |
          sccache --show-stats || true
          cache_writes=$(sccache --show-stats --stats-format=json 2>/dev/null \
            | grep -o '"cache_writes":[0-9]*' | grep -o '[0-9]*' || echo 0)
          if [ "$cache_writes" -gt 0 ] 2>/dev/null; then
            echo "force=true" >> "$GITHUB_OUTPUT"
          else
            echo "force=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Save sccache store
        if: always()
        uses: AdGuardSoftwareLimited/actions/actions/registry-cache/save@master
        with:
          config: ${{ secrets.REGISTRY_CACHE_AUTH }}
          key: sccache-android-${{ hashFiles('conanfile.py') }}
          path: ${{ env.SCCACHE_DIR }}
          force: ${{ steps.sccache-stats.outputs.force }}

      - name: Upload Android artifactory payload
        uses: actions/upload-artifact@v7
        with:
          name: android-artifactory-payload
          path: ${{ env.M2_LOCAL_REPO }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload to Conan
        if: always()
        run: |
          conan remote login art "${{ secrets.ARTIFACTORY_USER }}" --password "${{ secrets.ARTIFACTORY_API_KEY }}"
          conan upload -r art -c "*" 2>&1 | grep --line-buffered "Uploading"

  windows-build:
    name: Windows build, tests and nuget pack
    if: github.repository == 'AdGuardSoftwareLimited/dns-libs'
    needs: [version, resolve-images]
    runs-on:
      - ephemeral
      - ephemeral-vmwin
      - ${{ needs.resolve-images.outputs.windows }}
      - ephemeral-limit-memory-6144
      - ephemeral-limit-cpu-4
      - ephemeral-run-id-${{ github.run_id }}
    env:
      # Read by cmake/version.cmake (the RC resource) and by
      # Directory.Build.targets (the C# assembly version attributes).
      DNS_LIBS_VERSION: ${{ needs.version.outputs.value }}
      # sccache local-disk store, restored/saved across runs by the
      # registry-cache action
      # (AdGuardSoftwareLimited/actions/actions/registry-cache) as an OCI
      # registry blob. One SCCACHE_DIR is shared by both sccache-using steps
      # ("Build C and C# library" and "Build adyg") since they run on the same
      # runner with the same cl.exe, so a single restore/save pair wraps both.
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      SCCACHE_CACHE_SIZE: 512M
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # sccache wraps cl.exe so the core libraries (common, net, dnscrypt,
      # dnsstamp, upstream, dnsproxy) are reused across runs instead of being
      # recompiled from scratch on every push -- this dominates the ~7 min of
      # per-architecture MSVC recompilation across the three build directories
      # (build, build64, buildarm64). The sccache binary is installed by
      # AdguardTeam/sccache-action (binary only); the local SCCACHE_DIR store
      # is restored once before the builds and saved once after the final build
      # (adyg) by the registry-cache action below. The
      # CMAKE_C/CXX_COMPILER_LAUNCHER=sccache flags below route cl.exe through
      # sccache in each cmake invocation.
      - name: Configure sccache
        uses: AdguardTeam/sccache-action@main

      - name: Restore sccache store
        uses: AdGuardSoftwareLimited/actions/actions/registry-cache/restore@master
        with:
          config: ${{ secrets.REGISTRY_CACHE_AUTH }}
          # Per-job prefix (not the repo name -- registry-cache already
          # namespaces by repo via GITHUB_REPOSITORY) + conanfile.py hash so
          # the store resets when the dependency graph changes. Shared by the
          # capi build below and the adyg build further down (same cl.exe, same
          # sccache daemon, same SCCACHE_DIR). The -z7 suffix busts the store
          # after adding CMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded, so the
          # first run repopulates and uploads a fresh store.
          key: sccache-windows-${{ hashFiles('conanfile.py') }}
          path: ${{ env.SCCACHE_DIR }}

      - name: Build C and C# library and run tests
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          & conan remote add --index 0 art ${{ vars.CONAN_REPO_URL }}

          # Save vcvars to switch between them
          $vcvars32 = cmd /c "vcvarsamd64_x86 & set"
          $vcvars64 = cmd /c "vcvars64 & set"
          $vcvarsarm64 = cmd /c "vcvarsamd64_arm64 & set"
          function setvar($_) {
            if ($_ -match "=") {
              $v = $_.split("="); set-item -force -path "ENV:\$($v[0])"  -value "$($v[1])"
            }
          }

          cd platform/windows/capi
          & {
            $vcvars32 | foreach { setvar $_ }
            mkdir build
            pushd build
            & cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo `
              -DCMAKE_USE_OPENSSL=ON `
              -DCMAKE_C_COMPILER="cl.exe" `
              -DCMAKE_CXX_COMPILER="cl.exe" `
              -DCMAKE_C_COMPILER_LAUNCHER=sccache `
              -DCMAKE_CXX_COMPILER_LAUNCHER=sccache `
              -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded `
              -G Ninja ..
            if (!$?) { exit 1 }
            & ninja AdguardDns
            if (!$?) { exit 1 }
            & ninja tests
            if (!$?) { exit 1 }
            # Run the real-network integration tests (DoT/DoH/DoQ/DNSCrypt)
            # alongside the offline suite. The capi build lives in its own
            # source tree, so it cannot reuse the root `make test-ci` target
            # the Linux job uses.
            #
            # TODO(scheduled-builds): running the real-network integration
            # tests on every push and pull request is wasteful and prone to
            # flakes caused by transient public-DNS failures. Consider moving
            # them to a scheduled (cron) build and running only the offline
            # tests on push and pull request events instead.
            $Env:DNSLIBS_INTEGRATION_TESTS = "1"
            # --output-on-failure streams the captured stdout/stderr of every
            # failing ctest entry into this step's log (otherwise it only lands
            # in Testing/Temporary/LastTest.log on the runner, which is not
            # visible in the Actions UI and can't be diagnosed on cancelled runs).
            & ctest -D ExperimentalTest --no-compress-output --output-on-failure
            if (!$?) { exit 1 }
            popd
          }
          & {
            $vcvars64 | foreach { setvar $_ }
            mkdir build64
            pushd build64
            & cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo `
              -DCMAKE_USE_OPENSSL=ON `
              -DCMAKE_C_COMPILER="cl.exe" `
              -DCMAKE_CXX_COMPILER="cl.exe" `
              -DCMAKE_C_COMPILER_LAUNCHER=sccache `
              -DCMAKE_CXX_COMPILER_LAUNCHER=sccache `
              -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded `
              -G Ninja ..
            if (!$?) { exit 1 }
            & ninja AdguardDns64
            if (!$?) { exit 1 }
            popd
          }
          & {
            $vcvarsarm64 | foreach { setvar $_ }
            mkdir buildarm64
            pushd buildarm64
            & cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo `
              -DCMAKE_USE_OPENSSL=ON `
              -DCMAKE_C_COMPILER="cl.exe" `
              -DCMAKE_CXX_COMPILER="cl.exe" `
              -DCMAKE_C_COMPILER_LAUNCHER=sccache `
              -DCMAKE_CXX_COMPILER_LAUNCHER=sccache `
              -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded `
              -DCMAKE_SYSTEM_NAME=Windows `
              -DCMAKE_SYSTEM_PROCESSOR=ARM64 `
              -G Ninja ..
            if (!$?) { exit 1 }
            & ninja AdguardDnsArm64
            if (!$?) { exit 1 }
            popd
          }

          cd ../cs/Adguard.Dns
          Remove-Item *.nupkg -Force -ErrorAction SilentlyContinue
          & nuget sources add -Name Artifactory -Source "${{ vars.NUGET_REPO_URL }}"
          if (!$?) { exit 1 }
          ${Env:NUGET_PACKAGES}="$(pwd)/packages"
          & nuget restore
          if (!$?) { exit 1 }

          # Skip strong name verification
          & sn -Vr *
          if (!$?) { exit 1 }
          # Run C# tests
          & msbuild Adguard.Dns.Tests /t:Build /t:Test /p:Configuration=Release /p:Platform=AnyCPU
          if (!$?) { exit 1 }
          # Build the NuGet package
          & nuget pack Adguard.Dns -p Configuration=Release -p Platform=AnyCPU
          if (!$?) { exit 1 }

      - name: Upload C++ test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-windows
          path: '**/Testing/*/*.xml'
          retention-days: 7

      - name: Upload C# test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-windows-cs
          path: '**/Adguard.Dns.Tests/TestResult.xml'
          retention-days: 7

      - name: Upload nuget package
        uses: actions/upload-artifact@v7
        with:
          name: windows-nupkg
          path: platform/windows/cs/Adguard.Dns/*.nupkg
          if-no-files-found: error
          retention-days: 7

      # Build adyg from the root CMake project (capi only adds proxy) into a
      # separate build-adyg/ dir, routing cl.exe through sccache. This is the
      # second sccache-using step in this job; it shares the SCCACHE_DIR and
      # the running sccache daemon with the capi build above, so the store
      # accumulates entries from both builds before the single save below.
      - name: Build adyg
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          & conan remote add --index 0 art ${{ vars.CONAN_REPO_URL }}

          $vcvars64 = cmd /c "vcvars64 & set"
          function setvar($_) {
            if ($_ -match "=") {
              $v = $_.split("="); set-item -force -path "ENV:\$($v[0])"  -value "$($v[1])"
            }
          }
          $vcvars64 | foreach { setvar $_ }

          # The msvc-relwithdebinfo preset (CMakePresets.json) carries the
          # compiler, generator, build type and CMAKE_USE_OPENSSL; only the
          # CI-specific sccache flags are added here. -B overrides the preset's
          # default binary directory so the capi build and this one stay apart.
          & cmake --preset msvc-relwithdebinfo -B build-adyg `
            -DCMAKE_C_COMPILER_LAUNCHER=sccache `
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache `
            -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded
          if (!$?) { exit 1 }
          & cmake --build build-adyg --target adyg
          if (!$?) { exit 1 }

      # Print sccache counters and decide whether to force-save the store.
      # See the linux-build job for the full rationale: force=true when
      # cache_writes > 0 (new entries written this run), force=false
      # otherwise (all cache hits, local store unchanged, save no-ops).
      # This is the only save in this job -- it captures the shared store
      # after both sccache-using steps (capi build + adyg).
      # $LASTEXITCODE = 0 ignores a non-zero exit (e.g. daemon already
      # exited). Runs `if: always()` so stats still print on failure.
      - name: sccache stats
        id: sccache-stats
        if: always()
        shell: powershell
        run: |
          & sccache --show-stats
          $LASTEXITCODE = 0
          $json = (& sccache --show-stats --stats-format=json) 2>$null
          if ($json) {
            $stats = $json | ConvertFrom-Json
            $cacheWrites = [int]$stats.stats.cache_writes
          } else {
            $cacheWrites = 0
          }
          if ($cacheWrites -gt 0) {
            echo "force=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "force=false" >> $env:GITHUB_OUTPUT
          }

      - name: Save sccache store
        if: always()
        uses: AdGuardSoftwareLimited/actions/actions/registry-cache/save@master
        with:
          config: ${{ secrets.REGISTRY_CACHE_AUTH }}
          key: sccache-windows-${{ hashFiles('conanfile.py') }}
          path: ${{ env.SCCACHE_DIR }}
          force: ${{ steps.sccache-stats.outputs.force }}

      - name: Upload adyg binary
        uses: actions/upload-artifact@v7
        with:
          name: adyg-windows
          path: build-adyg/tools/adyg/adyg.exe
          if-no-files-found: error
          retention-days: 7

      - name: Upload to Conan
        if: always()
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          & conan remote login art "${{ secrets.ARTIFACTORY_USER }}" --password "${{ secrets.ARTIFACTORY_API_KEY }}"
          & conan upload -r art -c "*" 2>&1 | Select-String "Uploading" -SimpleMatch

  linux-adyg:
    name: Linux adyg build
    if: github.repository == 'AdGuardSoftwareLimited/dns-libs'
    needs: [resolve-images]
    runs-on:
      - ephemeral
      - ephemeral-linux
      - ${{ needs.resolve-images.outputs.corelibs-builder }}
      - ephemeral-limit-memory-6144
      - ephemeral-limit-cpu-4
      - ephemeral-run-id-${{ github.run_id }}
    container:
      image: adguard/core-libs:2.11
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build adyg
        run: |
          set -e
          set -x

          # Conan is pre-installed in the adguard/core-libs image (2.24.0 at
          # /usr/local/bin/conan), so it is not pip-installed here -- doing so
          # would either be a no-op or silently upgrade conan past the image's
          # pinned version, drifting CI from local `make` builds. Only the
          # Artifactory `art` remote is added.
          conan remote add --index 0 art ${{ vars.CONAN_REPO_URL }} || true

          # `make build_adyg` configures the root CMake project and builds the
          # `adyg` target (dig-like DNS query tool: plain DNS, DoT, DoH, DoQ,
          # DNSCrypt). Release build (default BUILD_TYPE=release ->
          # RelWithDebInfo): the produced binary is uploaded as an artifact.
          SKIP_BOOTSTRAP=1 make build_adyg

      - name: Upload adyg binary
        uses: actions/upload-artifact@v7
        with:
          name: adyg-linux
          path: cmake-build-clang-relwithdebinfo/tools/adyg/adyg
          if-no-files-found: error
          retention-days: 7

